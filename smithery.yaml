name: agentinbox
version: 0.1.0
author: AgentInbox
description: Email verification infrastructure for AI agents and test automation
license: MIT
mcp:
  endpoint: https://agentinbox.in/api/mcp
  transport: http
  authentication:
    type: bearer
    header: Authorization
  tools:
    - create_inbox
    - list_inboxes
    - get_inbox
    - delete_inbox
    - list_messages
    - get_message
    - list_extractions
    - wait_for_email
    - wait_for_otp
    - wait_for_magic_link
    - wait_for_password_reset
    - check_wait
